<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

  <!-- Add your site or application content here -->
  <h1 id="title">Welcome to The Game</h1>

  <div class="stats">

    <div class="stat" id="timerBox">
      <p class="label">Time Left</p>
      <p id="timerDisplay">5</p>
    </div>

    <div class="stat">
      <p class="label">Score</p>
      <p id="scoreDisplay">0</p>
    </div>

  </div>

  <button id="button1">Click me</button>

  <label id="label1" for="name">Name (3 to 16 characters):</label>

  <input
    placeholder="Enter your name"
    type="text"
    id="name"
    name="name"
    required
    minlength="3"
    maxlength="16"
    size="16"
  />

  <button id="button2">Submit High Score</button>

  <script src="js/app.js"></script>

</body>

</html>
